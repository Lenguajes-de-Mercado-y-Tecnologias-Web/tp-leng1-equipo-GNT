<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - ONG Verde</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body><div class="contenedor">

    <button id="btn-modo" type="button" onclick="cambioClaseContenedor()">
    🔅 Descanzo Vista
</button>
  
  <div id="header-placeholder"></div>

  <main class="container py-4">
    <div class="row g-4 align-items-start">
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm h-100">
          <img src="https://images.pexels.com/photos/1301856/pexels-photo-1301856.jpeg?auto=compress&cs=tinysrgb&w=1200" class="card-img-top" alt="Huerta organica con hortalizas verdes" loading="lazy">
          <div class="card-body">
            <h2 class="h4">Huerta orgánica en acción</h2>
            <p class="mb-0">Inspirate con una huerta organica saludable y sustentable.</p>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">
            <span class="badge text-bg-success rounded-pill mb-3">Registro</span>
            <h2 class="h3 mb-3">Formulario de participación</h2>
            <p class="mb-4">Completa tus datos para ayudarte a elegir cultivos y cuidados adecuados para tu zona.</p>

            <form method="GET">
              <div class="mb-3">
                <label class="form-label" for="nombre">Nombre:</label>
                <input class="form-control" id="nombre" type="text" name="nombre" required>
              </div>

              <div class="mb-3">
                <label class="form-label" for="ocupacion">¿A qué te dedicás?</label>
                <input class="form-control" id="ocupacion" type="text" name="ocupacion" required>
              </div>

              <div class="mb-3">
                <label class="form-label" for="zona">¿De qué zona sos?</label>
                <input class="form-control" id="zona" type="text" name="zona" required>
              </div>

              <p class="texto-ayuda">Elegí tu clima para enviar y ver recomendaciones de plantación.</p>
              <div class="acciones-clima d-flex flex-wrap gap-2">
                <button class="btn btn-success" type="submit" formaction="gracias.html#templado">Enviar (Templado)</button>
                <button class="btn btn-success" type="submit" formaction="gracias.html#calido">Enviar (Cálido)</button>
                <button class="btn btn-success" type="submit" formaction="gracias.html#frio">Enviar (Frío)</button>
                <button class="btn btn-success" type="submit" formaction="gracias.html#seco">Enviar (Seco)</button>
                <button class="btn btn-success" type="submit" formaction="gracias.html#humedo">Enviar (Húmedo)</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  </div>

  <footer>
	<p>© 2026 ONG Verde</p>
  </footer>

  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src ="app.js"></script>
  <script src="header.js"></script>
</body>
</html>
